name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Пишем собранный сайт в ветку gh-pages (источник Pages — эта ветка).
# keep_files: true не даёт затирать каталог pr-preview/ с превью PR.
permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          keep_files: true
